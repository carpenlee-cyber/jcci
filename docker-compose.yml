version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jcci-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DB_PATH=/app/data/jcci.db
    restart: unless-stopped
    networks:
      - jcci-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jcci-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jcci-network

networks:
  jcci-network:
    driver: bridge
